{% extends "base.html" %}

{% block title %}Add Appointment{% endblock %}

{% block content %}
<div class="dashboard-wrapper">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <h4 class="mb-4">Add Appointment</h4>
        <form method="POST">
          <label>User</label>
          <select name="user_id" class="form-control mb-2" required>
            <option value="">Select User</option>
            {% for u in users %}
              <option value="{{ u.id }}">{{ u.full_name }} ({{ u.email }})</option>
            {% endfor %}
          </select>

          <label>Doctor</label>
          <select name="doctor_id" class="form-control mb-2" required>
            <option value="">Select Doctor</option>
            {% for d in doctors %}
              <option value="{{ d.id }}">{{ d.name }} - {{ d.specialty }}</option>
            {% endfor %}
          </select>

          <label>Scheduled Time</label>
          <input type="datetime-local" name="scheduled_time" class="form-control mb-2" required>

          <label>Status</label>
          <select name="status" class="form-control mb-2">
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>

          <label>Payment Status</label>
          <select name="payment_status" class="form-control mb-2">
            <option value="unpaid">Unpaid</option>
            <option value="paid">Paid</option>
          </select>

          <button type="submit" class="btn btn-accent">Add Appointment</button>
          <a href="{{ url_for('admin_appointments') }}" class="btn btn-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

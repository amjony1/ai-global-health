{% extends "base.html" %}

{% block title %}{{ plan_name }} Details{% endblock %}

{% block content %}
<style>
    body {
        background: linear-gradient(135deg, #0a3e61, #4b72e6);
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
    }

    .glass-card {
        background: rgba(15, 76, 117, 0.25);
        border-radius: 16px;
        backdrop-filter: blur(12px) saturate(180%);
        -webkit-backdrop-filter: blur(12px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.15);
        padding: 2rem;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        color: #e0f7fa;
        margin-top: 2rem;
        text-align: center;
    }

    .glass-card h2 {
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: #b2ebf2;
    }

    .glass-card h4 {
        color: #80deea;
        margin-bottom: 1rem;
    }

    .glass-card h5 {
        color: #b2ebf2;
        margin-top: 1rem;
        margin-bottom: 0.5rem;
    }

    ul {
        list-style: disc;
        padding-left: 1.5rem;
        text-align: left;
        color: #e0f7fa;
    }

    .btn-accent {
        background: rgba(0, 150, 199, 0.3);
        color: #e0f7fa;
        border: none;
        transition: 0.3s;
    }

    .btn-accent:hover {
        background: rgba(0, 150, 199, 0.5);
        color: #ffffff;
    }

    .btn-outline-secondary {
        border-color: #00acc1;
        color: #00acc1;
        transition: 0.3s;
    }

    .btn-outline-secondary:hover {
        background: rgba(0, 172, 193, 0.3);
        color: #e0f7fa;
        border-color: #00acc1;
    }

    @media (max-width: 768px) {
        ul {
            padding-left: 1rem;
        }
    }
</style>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card">
                <h2>{{ plan_name }}</h2>
                <h4>{{ plan.price }}</h4>
                <h5>Features:</h5>
                <ul>
                    {% for feature in plan.features %}
                        <li>{{ feature }}</li>
                    {% endfor %}
                </ul>
                <a href="{{ url_for('subscribe_plan', plan_name=plan_name) }}" class="btn btn-accent mt-3">Subscribe</a>
                <a href="{{ url_for('plans') }}" class="btn btn-outline-secondary mt-2">Back to Plans</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

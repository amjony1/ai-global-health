{% extends "base.html" %}

{% block title %}
<span class="lang-bn" lang="bn">ব্যবহারকারী সম্পাদনা</span>
<span class="lang-en" lang="en">Edit User</span>
{% endblock %}

{% block content %}
<div class="dashboard-wrapper">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h4 class="mb-4">
                    <span class="lang-bn" lang="bn">ব্যবহারকারী সম্পাদনা</span>
                    <span class="lang-en" lang="en">Edit User</span>
                </h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" class="form-control" value="{{ user.full_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">City</label>
                        <input type="text" name="city" class="form-control" value="{{ user.city }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Division</label>
                        <input type="text" name="division" class="form-control" value="{{ user.division }}">
                    </div>
                    <button type="submit" class="btn btn-accent">Save Changes</button>
                    <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function toggleLanguage(lang) {
    localStorage.setItem("lang", lang);
    document.querySelectorAll('.lang-bn').forEach(el => el.style.display = lang === 'bn' ? '' : 'none');
    document.querySelectorAll('.lang-en').forEach(el => el.style.display = lang === 'en' ? '' : 'none');
}
document.addEventListener('DOMContentLoaded', function() {
    const savedLang = localStorage.getItem("lang") || (navigator.language.startsWith('bn') ? 'bn' : 'en');
    toggleLanguage(savedLang);
});
</script>
{% endblock %}

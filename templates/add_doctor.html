{% extends "base.html" %}

{% block title %}Add Doctor{% endblock %}

{% block content %}
<div class="dashboard-wrapper">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <h4 class="mb-4">Add Doctor</h4>
        <form method="POST">
          <input type="text" name="name" class="form-control mb-2" placeholder="Full Name" required>
          <input type="text" name="specialty" class="form-control mb-2" placeholder="Specialty" required>
          <input type="text" name="division" class="form-control mb-2" placeholder="Division">
          <input type="text" name="district" class="form-control mb-2" placeholder="District">
          <input type="text" name="hospital" class="form-control mb-2" placeholder="Hospital">
          <input type="number" step="0.01" name="consultation_fee" class="form-control mb-2" placeholder="Consultation Fee" required>
          <input type="text" name="contact" class="form-control mb-2" placeholder="Contact">
          <button type="submit" class="btn btn-accent">Add Doctor</button>
          <a href="{{ url_for('admin_doctors') }}" class="btn btn-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

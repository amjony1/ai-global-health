{% extends "base.html" %}

{% block title %}Edit Doctor{% endblock %}

{% block content %}
<div class="dashboard-wrapper">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <h4 class="mb-4">Edit Doctor</h4>
        <form method="POST">
          <input type="text" name="name" class="form-control mb-2" value="{{ doctor.name }}" required>
          <input type="text" name="specialty" class="form-control mb-2" value="{{ doctor.specialty }}" required>
          <input type="text" name="division" class="form-control mb-2" value="{{ doctor.division }}">
          <input type="text" name="district" class="form-control mb-2" value="{{ doctor.district }}">
          <input type="text" name="hospital" class="form-control mb-2" value="{{ doctor.hospital }}">
          <input type="number" step="0.01" name="consultation_fee" class="form-control mb-2" value="{{ doctor.consultation_fee }}" required>
          <input type="text" name="contact" class="form-control mb-2" value="{{ doctor.contact }}">
          <button type="submit" class="btn btn-accent">Save Changes</button>
          <a href="{{ url_for('admin_doctors') }}" class="btn btn-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
